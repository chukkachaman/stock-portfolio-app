{% extends './navbar.html' %}
{% load static %}

{% block body %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - Pro Trader X</title>
    <link rel="stylesheet" href="{% static 'stock/css/add_funds.css' %}" type="text/css" media="screen">
    <link rel="stylesheet" href="{% static 'stock/css/navbar.css' %}" type="text/css" media="screen">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="background-image: url('{% static 'stock/images/bg.jpg' %}'); background-size: cover; background-position: center;">

<section class="container">
    <h2 class="heading">Add Funds to Your Budget</h2>

    <p id="status-message" class="error-message"></p>

    <p class="meta-row">Current budget: <strong>${{ user.budget }}</strong></p>
    <p class="meta-row">Payments are processed by Razorpay in test mode - no real charge occurs.</p>

    <div class="amounts-grid">
        {% for amount in amounts %}
        <button type="button" class="amount-btn" data-amount="{{ amount }}">+ Rs {{ amount }}</button>
        {% endfor %}
    </div>

    <div class="custom-amount-row">
        <input type="number" id="custom-amount" min="100" step="1" placeholder="Enter amount (min Rs 100)">
        <button type="button" class="amount-btn" id="custom-amount-btn">+ Add</button>
    </div>
</section>

<script>
function startPayment(amount) {
    const statusEl = document.getElementById('status-message');
    statusEl.textContent = '';

    fetch("{% url 'create_order' %}", {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: 'amount=' + encodeURIComponent(amount)
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
            if (data.error) {
                statusEl.textContent = data.error;
                return;
            }

            const rzp = new Razorpay({
                key: data.key_id,
                amount: data.amount,
                currency: data.currency,
                name: 'Pro Trader X',
                description: 'Portfolio budget top-up',
                order_id: data.order_id,
                theme: { color: '#6366f1' },
                handler: function (response) {
                    fetch("{% url 'verify_payment' %}", {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': '{{ csrf_token }}',
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: new URLSearchParams(response).toString()
                    })
                    .then(function (res) { return res.json(); })
                    .then(function (result) {
                        if (result.status === 'ok') {
                            window.location.href = "{% url 'payment_success' %}?order_id=" + data.order_id;
                        } else {
                            statusEl.textContent = result.error || 'Payment verification failed.';
                        }
                    });
                }
            });

            rzp.open();
        })
        .catch(function () {
            statusEl.textContent = 'Something went wrong starting the payment.';
        });
}

document.querySelectorAll('.amounts-grid .amount-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
        startPayment(this.dataset.amount);
    });
});

document.getElementById('custom-amount-btn').addEventListener('click', function () {
    const statusEl = document.getElementById('status-message');
    const input = document.getElementById('custom-amount');
    const amount = parseInt(input.value, 10);

    if (!amount || amount < 100) {
        statusEl.textContent = 'Enter an amount of at least Rs 100.';
        return;
    }

    startPayment(amount);
});
</script>

</body>
</html>
{% endblock body %}
